<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Panel - Minecraft 服务器管理</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117; --panel: #1a1d27; --card: #232730; --border: #2e3340;
            --text: #e4e6eb; --muted: #8b8fa3; --accent: #6366f1; --accent-h: #818cf8;
            --green: #22c55e; --red: #ef4444; --yellow: #eab308;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

        /* 顶部栏 */
        .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        .topbar h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .topbar h1 span { color: var(--accent); }
        .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
        .status-badge.connected { background: #22c55e22; color: var(--green); border: 1px solid #22c55e44; }
        .status-badge.disconnected { background: #ef444422; color: var(--red); border: 1px solid #ef444444; }

        /* 主体布局 */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* 左侧边栏 */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .server-list { flex: 1; overflow-y: auto; padding: 8px; }
        .server-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
        .server-item:hover { background: var(--card); }
        .server-item.active { background: var(--accent); color: #fff; }
        .server-item.active .server-id { color: rgba(255,255,255,0.7); }
        .server-name { font-size: 14px; font-weight: 600; }
        .server-id { font-size: 12px; color: var(--muted); }
        .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .dot.off { background: var(--muted); }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-h); }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { opacity: 0.85; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { opacity: 0.85; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-icon { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--card); border: 1px solid var(--border); cursor: pointer; color: var(--text); font-size: 16px; }
        .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

        /* 右侧内容区 */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; background: var(--panel); }
        .content-header h2 { font-size: 16px; font-weight: 600; }
        .content-actions { display: flex; gap: 8px; }

        /* 控制台区域 */
        .console-wrap { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow: hidden; }
        .console-toolbar { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
        .console-toolbar select { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; font-size: 13px; }
        .console { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 8px; overflow-y: auto; padding: 12px; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        .console .log-error { color: #f87171; }
        .console .log-system { color: #4ade80; }
        .console .log-info { color: #a3a3a3; }
        .console .log-warn { color: #facc15; }

        .command-bar { display: flex; gap: 8px; }
        .command-bar input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: 'Cascadia Code', monospace; outline: none; }
        .command-bar input:focus { border-color: var(--accent); }
        .command-bar input::placeholder { color: var(--muted); }

        /* 弹窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 440px; max-width: 90vw; }
        .modal h3 { margin-bottom: 16px; font-size: 16px; }
        .modal .form-group { margin-bottom: 12px; }
        .modal label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
        .modal input, .modal select { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; }
        .modal input:focus { border-color: var(--accent); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); gap: 12px; }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }

        /* 通知 */
        .toast { position: fixed; top: 20px; right: 20px; z-index: 200; }
        .toast-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; margin-bottom: 8px; font-size: 13px; animation: slideIn 0.2s ease; }
        .toast-item.success { border-left: 3px solid var(--green); }
        .toast-item.error { border-left: 3px solid var(--red); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="topbar">
        <h1><span>⬢</span> MC Panel</h1>
        <span id="connStatus" class="status-badge disconnected">未连接</span>
    </div>

    <!-- 主体 -->
    <div class="main">
        <!-- 左侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>服务器列表</h2>
                <button class="btn-icon" onclick="openModal()" title="添加服务器">+</button>
            </div>
            <div class="server-list" id="serverList">
                <!-- 动态填充 -->
            </div>
            <div style="padding: 12px; border-top: 1px solid var(--border);">
                <button class="btn btn-ghost btn-sm" style="width:100%" onclick="refreshServers()">刷新列表</button>
            </div>
        </div>

        <!-- 右侧内容 -->
        <div class="content">
            <div id="noServer" class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span>选择左侧的服务器查看控制台</span>
            </div>
            <div id="serverView" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
                <div class="content-header">
                    <div>
                        <h2 id="currentServerName">-</h2>
                        <span id="currentServerId" style="font-size:12px; color:var(--muted)"></span>
                    </div>
                    <div class="content-actions">
                        <button id="btnStart" class="btn btn-success btn-sm" onclick="startServer()">▶ 启动</button>
                        <button id="btnStop" class="btn btn-danger btn-sm" onclick="stopServer()" disabled>■ 停止</button>
                        <button id="btnForceStop" class="btn btn-danger btn-sm" onclick="forceStop()" style="display:none">⚠ 强制停止</button>
                        <button class="btn btn-ghost btn-sm" onclick="editServer()">⚙ 编辑</button>
                        <button class="btn btn-ghost btn-sm" onclick="deleteServer()">🗑 删除</button>
                    </div>
                </div>
                <div class="console-wrap">
                    <div class="console-toolbar">
                        <span>日志筛选：</span>
                        <select id="logFilter" onchange="filterLogs()">
                            <option value="all">全部</option>
                            <option value="info">普通日志</option>
                            <option value="error">错误</option>
                            <option value="system">系统</option>
                        </select>
                        <span style="flex:1"></span>
                        <button class="btn btn-ghost btn-sm" onclick="clearConsole()">清屏</button>
                    </div>
                    <div class="console" id="console"></div>
                    <div class="command-bar">
                        <input type="text" id="cmdInput" placeholder="输入 MC 指令，如：say 大家好、list、give ..." onkeydown="if(event.key==='Enter') sendCommand()">
                        <button class="btn btn-primary" onclick="sendCommand()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">添加服务器</h3>
            <div class="form-group">
                <label>服务器 ID（唯一标识，英文）</label>
                <input id="fId" placeholder="例如：survival_01">
            </div>
            <div class="form-group">
                <label>服务器名称（显示用）</label>
                <input id="fName" placeholder="例如：生存服务器">
            </div>
            <div class="form-group">
                <label>服务器路径（MC服务端文件夹）</label>
                <input id="fPath" placeholder="例如：D:/mc-server">
            </div>
            <div class="form-group">
                <label>Jar 包名</label>
                <input id="fJar" placeholder="例如：server.jar">
            </div>
            <div class="form-group">
                <label>Java 启动参数</label>
                <input id="fArgs" value="-Xms1G -Xmx2G">
            </div>
            <div class="form-group">
                <label>Java 路径（留空则使用系统默认 java）</label>
                <input id="fJava" placeholder="留空使用默认 java">
            </div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveServer()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <script>
        // ================= 全局状态 =================
        const MAX_LOG_ENTRIES = 500;   // #3 每个服务器最多保留 500 条日志
        const MAX_DOM_LINES = 500;     // #7 控制台最大 DOM 行数
        const MAX_TOASTS = 5;          // #10 最多同时显示 5 个 Toast

        let servers = [];
        let selectedId = null;
        let logStore = {};
        let connection = null;
        let isEditing = false;

        // ================= SignalR 连接 =================
        function connectSignalR() {
            // #9 清理旧连接
            if (connection) {
                connection.stop().catch(() => {});
                connection = null;
            }

            connection = new signalR.HubConnectionBuilder()
                .withUrl("/hubs/console")
                // #8 更平滑的重连策略：从 1s 开始递增
                .withAutomaticReconnect([1000, 3000, 5000, 10000, 30000])
                .build();

            connection.on("ReceiveLog", (serverId, message) => {
                if (!logStore[serverId]) logStore[serverId] = [];
                let type = 'info';
                if (message.includes('[错误]')) type = 'error';
                else if (message.includes('[系统]')) type = 'system';
                else if (message.includes('[WARN]') || message.includes('[警告]')) type = 'warn';
                logStore[serverId].push({ msg: message, type });
                // #3 超出上限时删除最早的消息
                if (logStore[serverId].length > MAX_LOG_ENTRIES)
                    logStore[serverId].splice(0, logStore[serverId].length - MAX_LOG_ENTRIES);
                if (selectedId === serverId) appendLog(message, type);
            });

            connection.on("ServerStatusChanged", (serverId, status) => {
                const s = servers.find(x => x.id === serverId);
                if (s) { s.status = status; renderSidebar(); updateButtons(); }
            });

            connection.onreconnecting(() => {
                document.getElementById('connStatus').textContent = '重连中...';
                document.getElementById('connStatus').className = 'status-badge disconnected';
            });

            connection.onreconnected(() => {
                document.getElementById('connStatus').textContent = '已连接';
                document.getElementById('connStatus').className = 'status-badge connected';
            });

            connection.start().then(() => {
                document.getElementById('connStatus').textContent = '已连接';
                document.getElementById('connStatus').className = 'status-badge connected';
            }).catch(err => {
                document.getElementById('connStatus').textContent = '连接失败';
                showToast('SignalR 连接失败: ' + err, 'error');
            });
        }

        // ================= API 调用 =================
        async function refreshServers() {
            try {
                const res = await fetch('/api/servers');
                servers = await res.json();
                servers.forEach(s => { if (!logStore[s.id]) logStore[s.id] = []; });
                renderSidebar();
                updateButtons();
            } catch (e) { showToast('获取服务器列表失败: ' + e, 'error'); }
        }

        async function startServer() {
            if (!selectedId) return;
            const res = await fetch(`/api/servers/${selectedId}/start`, { method: 'POST' });
            const msg = await res.text();
            if (res.ok) showToast(msg, 'success');
            else showToast(msg, 'error');
            await refreshServers();
        }

        async function stopServer() {
            if (!selectedId) return;
            const res = await fetch(`/api/servers/${selectedId}/stop`, { method: 'POST' });
            const msg = await res.text();
            if (res.ok) showToast(msg, 'success');
            else showToast(msg, 'error');
        }

        async function forceStop() {
            if (!selectedId) return;
            if (!confirm('确定要强制停止吗？这可能导致数据丢失！')) return;
            const res = await fetch(`/api/servers/${selectedId}/forcestop`, { method: 'POST' });
            const msg = await res.text();
            if (res.ok) showToast(msg, 'success');
            else showToast(msg, 'error');
            await refreshServers();
        }

        async function sendCommand() {
            if (!selectedId) return;
            const input = document.getElementById('cmdInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            const res = await fetch(`/api/servers/${selectedId}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            });
            if (!res.ok) showToast(await res.text(), 'error');
            input.value = '';
            input.focus();
        }

        async function saveServer() {
            const profile = {
                id: document.getElementById('fId').value.trim(),
                name: document.getElementById('fName').value.trim(),
                serverPath: document.getElementById('fPath').value.trim(),
                jarName: document.getElementById('fJar').value.trim(),
                javaArgs: document.getElementById('fArgs').value.trim() || '-Xms1G -Xmx2G',
                javaPath: document.getElementById('fJava').value.trim()
            };
            if (!profile.id || !profile.serverPath || !profile.jarName) {
                showToast('ID、服务器路径和Jar包名为必填项', 'error'); return;
            }
            const res = await fetch('/api/servers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile)
            });
            if (res.ok) {
                showToast(await res.text(), 'success');
                closeModal();
                await refreshServers();
                if (!selectedId) selectServer(profile.id);
            } else {
                showToast(await res.text(), 'error');
            }
        }

        async function deleteServer() {
            if (!selectedId) return;
            const s = servers.find(x => x.id === selectedId);
            if (s && s.status === 'running') { showToast('服务器正在运行，请先停止', 'error'); return; }
            if (!confirm(`确定要删除服务器 "${selectedId}" 吗？`)) return;
            const res = await fetch(`/api/servers/${selectedId}`, { method: 'DELETE' });
            if (res.ok) {
                showToast(await res.text(), 'success');
                selectedId = null;
                showNoServer();
                await refreshServers();
            } else {
                showToast(await res.text(), 'error');
            }
        }

        // ================= UI 渲染 =================
        function renderSidebar() {
            const list = document.getElementById('serverList');
            if (servers.length === 0) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">暂无服务器<br>点击 + 添加一个</div>';
                return;
            }
            list.innerHTML = servers.map(s => `
                <div class="server-item ${selectedId === s.id ? 'active' : ''}" onclick="selectServer('${s.id}')">
                    <div>
                        <div class="server-name">${s.name || s.id}</div>
                        <div class="server-id">${s.id}</div>
                    </div>
                    <div class="dot ${s.status === 'running' ? 'on' : 'off'}"></div>
                </div>
            `).join('');
        }

        function selectServer(id) {
            selectedId = id;
            const s = servers.find(x => x.id === id);
            if (!s) return;
            document.getElementById('noServer').style.display = 'none';
            const view = document.getElementById('serverView');
            view.style.display = 'flex';
            document.getElementById('currentServerName').textContent = s.name || s.id;
            document.getElementById('currentServerId').textContent = `${s.id} · ${s.serverPath}/${s.jarName}`;
            renderSidebar();
            updateButtons();
            renderConsole(id);
        }

        function showNoServer() {
            selectedId = null;
            document.getElementById('noServer').style.display = 'flex';
            document.getElementById('serverView').style.display = 'none';
            renderSidebar();
        }

        function updateButtons() {
            const s = servers.find(x => x.id === selectedId);
            const running = s && s.status === 'running';
            document.getElementById('btnStart').disabled = running;
            document.getElementById('btnStop').disabled = !running;
            document.getElementById('btnForceStop').style.display = running ? '' : 'none';
        }

        function renderConsole(serverId) {
            const c = document.getElementById('console');
            c.innerHTML = '';
            const logs = logStore[serverId] || [];
            const filter = document.getElementById('logFilter').value;
            logs.forEach(l => {
                if (filter === 'all' || l.type === filter)
                    appendLog(l.msg, l.type);
            });
            c.scrollTop = c.scrollHeight;
        }

        function appendLog(msg, type) {
            const c = document.getElementById('console');
            const div = document.createElement('div');
            div.textContent = msg;
            if (type === 'error') div.className = 'log-error';
            else if (type === 'system') div.className = 'log-system';
            else if (type === 'warn') div.className = 'log-warn';
            else div.className = 'log-info';
            c.appendChild(div);
            // #7 超出最大行数时移除最早的 DOM 节点
            while (c.childElementCount > MAX_DOM_LINES)
                c.removeChild(c.firstElementChild);
            c.scrollTop = c.scrollHeight;
        }

        function clearConsole() {
            if (selectedId) logStore[selectedId] = [];
            document.getElementById('console').innerHTML = '';
        }

        function filterLogs() { if (selectedId) renderConsole(selectedId); }

        // ================= 弹窗 =================
        function openModal(edit) {
            isEditing = !!edit;
            document.getElementById('modalTitle').textContent = isEditing ? '编辑服务器' : '添加服务器';
            if (isEditing) {
                const s = servers.find(x => x.id === selectedId);
                if (!s) return;
                document.getElementById('fId').value = s.id;
                document.getElementById('fId').disabled = true;
                document.getElementById('fName').value = s.name || '';
                document.getElementById('fPath').value = s.serverPath || '';
                document.getElementById('fJar').value = s.jarName || '';
                document.getElementById('fArgs').value = s.javaArgs || '-Xms1G -Xmx2G';
                document.getElementById('fJava').value = s.javaPath || '';
            } else {
                document.getElementById('fId').disabled = false;
                ['fId','fName','fPath','fJar','fArgs','fJava'].forEach(id => {
                    if (id === 'fArgs') document.getElementById(id).value = '-Xms1G -Xmx2G';
                    else document.getElementById(id).value = '';
                });
            }
            document.getElementById('modalOverlay').classList.add('show');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
        function editServer() { if (selectedId) openModal(true); }

        // ================= 通知 =================
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            // #10 超过最大数量时移除最早的 Toast
            while (t.childElementCount >= MAX_TOASTS)
                t.removeChild(t.firstElementChild);
            const div = document.createElement('div');
            div.className = `toast-item ${type}`;
            div.textContent = msg;
            t.appendChild(div);
            setTimeout(() => { if (div.parentNode) div.remove(); }, 4000);
        }

        // ================= 初始化 =================
        connectSignalR();
        refreshServers();
    </script>
</body>
</html>
