<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>MC 面板测试</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #eee; padding: 20px; }
        #console { background: #000; height: 400px; overflow-y: scroll; padding: 10px; font-family: monospace; border: 1px solid #555; white-space: pre-wrap; }
        input, button { padding: 8px; margin: 5px 0; }
        .log-info { color: #aaa; }
        .log-error { color: #ff5555; }
        .log-system { color: #55ff55; }
    </style>
</head>
<body>
    <h2>我的世界 - 极简控制面板</h2>
    
    <div>
        <button onclick="startServer()">启动服务器</button>
        <button onclick="stopServer()">停止服务器</button>
    </div>

    <h3>实时控制台日志：</h3>
    <div id="console"></div>

    <div>
        <input type="text" id="cmdInput" placeholder="输入MC指令，如: say 你好" style="width: 300px;" onkeypress="if(event.key==='Enter') sendCommand()">
        <button onclick="sendCommand()">发送指令</button>
    </div>

    <!-- 引入微软官方的 SignalR 客户端 JS 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script>
        // 1. 建立“对讲机”连接
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/hubs/console") // 连接后端的对讲机频道
            .withAutomaticReconnect() // 断线自动重连
            .build();

        // 2. 监听后端发来的日志
        connection.on("ReceiveLog", (message) => {
            const consoleDiv = document.getElementById("console");
            const p = document.createElement("div");
            p.innerText = message;
            
            // 简单给日志加点颜色
            if (message.includes("[错误]")) p.className = "log-error";
            else if (message.includes("[系统]")) p.className = "log-system";
            else p.className = "log-info";

            consoleDiv.appendChild(p);
            consoleDiv.scrollTop = consoleDiv.scrollHeight; // 自动滚动到底部
        });

        // 3. 启动连接
        connection.start().catch(err => console.error(err));

        // 4. 定义按钮点击事件（调用后端的 API 接口）
        async function startServer() {
            // 注意：这里的路径和jar包名，你需要改成你电脑上真实的MC服务端路径！
            const res = await fetch("/api/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    serverPath: "D:/test", // 【重要】改成你的MC服务端文件夹路径
                    jarName: "minecraft_server.1.12.2.jar"                // 【重要】改成你的jar包名字
                })
            });
            alert(await res.text());
        }

        async function stopServer() {
            const res = await fetch("/api/stop", { method: "POST" });
            alert(await res.text());
        }

        async function sendCommand() {
            const input = document.getElementById("cmdInput");
            const cmd = input.value;
            if (!cmd) return;

            const res = await fetch("/api/command", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ command: cmd })
            });
            alert(await res.text());
            input.value = "";
        }
    </script>
</body>
</html>
